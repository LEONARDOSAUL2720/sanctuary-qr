<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Localidad · Sanctuary QR</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:    #1e2a4a;
      --navy-dk: #0d1626;
      --gold:    #c8a84b;
      --gold-bg: #fffbeb;
      --gold-br: #fde68a;
      --bg:      #faf9f6;
      --card:    #ffffff;
      --border:  #e5e7eb;
      --text:    #111c2c;
      --muted:   #6b7280;
      --wa:      #25d366;
      --shadow:  0 2px 14px rgba(30,42,74,0.07);
      --radius:  12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER / HERO */
    .hero {
      background: linear-gradient(155deg, var(--navy-dk) 0%, var(--navy) 60%, #2d3f6e 100%);
      color: white;
      text-align: center;
      padding: 2.8rem 1.5rem 3rem;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 36px;
      background: var(--bg);
      clip-path: ellipse(56% 100% at 50% 100%);
    }
    .hero-cross-ring {
      width: 60px; height: 60px;
      background: rgba(200,168,75,0.15);
      border: 2px solid rgba(200,168,75,0.45);
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.75rem;
      margin-bottom: 1.1rem;
    }
    .hero-divider {
      width: 36px; height: 2px;
      background: var(--gold);
      margin: 0.9rem auto;
      opacity: 0.7;
      border-radius: 99px;
    }
    .hero-welcome {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }
    .hero-verse-ref {
      font-size: 0.82rem; font-weight: 600;
      color: rgba(200,168,75,0.9);
      margin-bottom: 0.55rem;
    }
    .hero-verse-text {
      font-size: 1.05rem; font-style: italic; font-weight: 400;
      color: rgba(255,255,255,0.88);
      line-height: 1.75;
      max-width: 400px;
      margin: 0 auto;
    }

    /* CONTENIDO */
    .content {
      max-width: 500px;
      margin: 0 auto;
      padding: 1.8rem 1rem 5rem;
      display: flex;
      flex-direction: column;
      gap: 0.95rem;
    }

    /* TARJETA NOMBRE */
    .church-title-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.4rem 1.25rem;
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
      box-shadow: var(--shadow);
    }
    .church-main-name {
      font-size: 1.45rem; font-weight: 800;
      color: var(--navy); line-height: 1.25;
      margin-bottom: 0.25rem;
    }
    .church-sub {
      font-size: 0.82rem; color: var(--muted);
      display: flex; align-items: center; gap: 0.35rem;
      margin-top: 0.2rem;
    }

    /* TARJETAS INFO */
    .info-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.2rem 1.15rem;
      border: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(30,42,74,0.04);
    }
    .card-label {
      font-size: 0.66rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--gold); margin-bottom: 0.65rem;
      display: flex; align-items: center; gap: 0.35rem;
    }
    .card-body {
      font-size: 0.9rem; color: var(--text);
      line-height: 1.65; white-space: pre-wrap;
    }

    /* MAPA */
    .map-frame {
      width: 100%; height: 220px; border: none;
      border-radius: 9px; margin-top: 0.75rem; display: block;
    }

    /* BOTONES */
    .action-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; width: 100%; padding: 0.78rem 1.2rem;
      border: none; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
      color: white; transition: opacity 0.15s, transform 0.1s;
      font-family: inherit; margin-top: 0.75rem; line-height: 1;
    }
    .action-btn:active { transform: scale(0.98); }
    .btn-maps     { background: #1a73e8; }
    .btn-maps:hover { opacity: 0.9; }
    .btn-wa       { background: var(--wa); }
    .btn-wa:hover { opacity: 0.9; }
    .btn-call     { background: var(--navy); }
    .btn-call:hover { opacity: 0.9; }
    .btn-pair {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.55rem; margin-top: 0.75rem;
    }
    .btn-pair .action-btn { margin-top: 0; }

    /* HORARIOS */
    .hour-row {
      display: flex; align-items: center; gap: 0.55rem;
      font-size: 0.88rem; padding: 0.38rem 0;
      border-bottom: 1px solid #f3f4f6; color: var(--text); line-height: 1.4;
    }
    .hour-row:last-child { border-bottom: none; }
    .hour-dot { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; flex-shrink: 0; }

    /* FOOTER */
    footer {
      text-align: center; padding: 1.2rem 1rem 2rem;
      font-size: 0.7rem; color: #a8a29e;
      border-top: 1px solid var(--border);
      max-width: 500px; margin: 0 auto;
    }

    /* ESTADO VACIO */
    .empty {
      text-align: center; padding: 5rem 2rem; color: var(--muted);
    }
    .empty .big { font-size: 4rem; display: block; margin-bottom: 1rem; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <div id="emptyState" class="empty" hidden>
    <span class="big">&#9978;</span>
    <strong>Codigo QR invalido</strong><br>
    <span style="font-size:0.85rem">No se encontro informacion de localidad en este enlace.</span>
  </div>

  <div id="churchPage" hidden>

    <!-- HEADER: estructura exacta de notas.txt -->
    <header class="hero">
      <div class="hero-cross-ring">&#10013;</div>
      <div class="hero-welcome"  id="hWelcome">Bienvenido a la Iglesia de Dios.</div>
      <div class="hero-divider"></div>
      <div class="hero-verse-ref" id="hVRef"></div>
      <div class="hero-verse-text" id="hVText"></div>
    </header>

    <!-- MAIN -->
    <main class="content">

      <!-- Nombre + pastor + distrito -->
      <div class="church-title-card">
        <div class="church-main-name" id="mainName">&#8212;</div>
        <div class="church-sub" id="mainDistrito" hidden>
          <span>&#127981;</span><span id="mainDistritoText"></span>
        </div>
        <div class="church-sub" id="mainPastor" hidden>
          <span>&#128100;</span><span id="mainPastorText"></span>
        </div>
      </div>

      <!-- Ubicacion -->
      <div class="info-card" id="cardLocation" hidden>
        <div class="card-label">&#128205; Ubicacion</div>
        <div class="card-body"  id="locationText"></div>
        <iframe id="mapFrame" class="map-frame" hidden
          loading="lazy" allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"></iframe>
        <a class="action-btn btn-maps" id="btnMaps" href="#" target="_blank" rel="noopener" hidden>
          &#128506; Abrir en Google Maps
        </a>
      </div>

      <!-- Horarios -->
      <div class="info-card" id="cardHorarios" hidden>
        <div class="card-label">&#128336; Horarios de culto</div>
        <div id="horariosBody"></div>
      </div>

      <!-- Contacto -->
      <div class="info-card" id="cardTel" hidden>
        <div class="card-label">&#128222; Contacto</div>
        <div class="card-body" id="telText"></div>
        <div class="btn-pair">
          <a class="action-btn btn-wa"   id="btnWA"   href="#" target="_blank" rel="noopener">&#128172; WhatsApp</a>
          <a class="action-btn btn-call" id="btnCall" href="#">&#128242; Llamar</a>
        </div>
      </div>

      <!-- Acerca de -->
      <div class="info-card" id="cardDesc" hidden>
        <div class="card-label">&#10024; Acerca de nosotros</div>
        <div class="card-body"  id="descText"></div>
      </div>

    </main>

    <footer>Sanctuary QR &middot; Directorio de Iglesias</footer>

  </div>

  <script>
  "use strict";

  function show(id)      { document.getElementById(id).removeAttribute('hidden'); }
  function setText(id,v) { document.getElementById(id).textContent = v; }
  function setHtml(id,v) { document.getElementById(id).innerHTML   = v; }
  function esc(s) {
    return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function cleanPhone(r) { return r.replace(/[\s\-().]/g,""); }

  function loadPage() {
    const hash = window.location.hash.slice(1);
    if (!hash) { show("emptyState"); return; }
    let p;
    try { p = new URLSearchParams(hash); }
    catch { show("emptyState"); return; }

    const n  = p.get("n")  || "";
    const d  = p.get("d")  || "";
    const c  = p.get("c")  || "";
    const pa = p.get("pa") || "";
    const t  = p.get("t")  || "";
    const di = p.get("di") || "";
    const h  = p.get("h")  || "";
    const a  = p.get("a")  || "";
    const m  = p.get("m")  || "";
    const e  = p.get("e")  || "";
    const w  = p.get("w")  || "Bienvenido a la Iglesia de Dios.";
    const vr = p.get("vr") || "Mateo 11:28";
    const vt = p.get("vt") || "\u00abVengan a m\u00ed todos los que est\u00e1n cansados y llevan cargas pesadas, y yo les dar\u00e9 descanso.\u00bb";

    if (!n) { show("emptyState"); return; }

    document.title = n;
    show("churchPage");

    // Header
    setText("hWelcome", w);
    if (vr) setText("hVRef",  vr);
    if (vt) setText("hVText", vt);

    // Nombre + distrito + pastor
    setText("mainName", n);
    if (di) { setText("mainDistritoText", di); show("mainDistrito"); }
    if (pa) { setText("mainPastorText", pa); show("mainPastor"); }

    // Ubicacion
    const loc = [d, c].filter(Boolean);
    if (loc.length) {
      setText("locationText", loc.join("\n"));
      show("cardLocation");
      if (e) {
        const fr = document.getElementById("mapFrame");
        fr.src = e;
        show("mapFrame");
      }
      const mHref = m || "https://www.google.com/maps/search/?api=1&query=" +
                         encodeURIComponent(loc.join(", "));
      document.getElementById("btnMaps").href = mHref;
      show("btnMaps");
    }

    // Horarios
    if (h) {
      const lines = h.split("\n").map(l=>l.trim()).filter(Boolean);
      const html  = lines.length
        ? lines.map(l=>`<div class="hour-row"><span class="hour-dot"></span>${esc(l)}</div>`).join("")
        : `<div class="hour-row"><span class="hour-dot"></span>${esc(h)}</div>`;
      setHtml("horariosBody", html);
      show("cardHorarios");
    }

    // Telefono
    if (t) {
      setText("telText", t);
      const cl = cleanPhone(t);
      document.getElementById("btnWA").href   = "https://wa.me/" + cl.replace("+","");
      document.getElementById("btnCall").href = "tel:" + cl;
      show("cardTel");
    }

    // Descripcion
    if (a) { setText("descText", a); show("cardDesc"); }
  }

  loadPage();
  window.addEventListener("hashchange", loadPage);
  </script>
</body>
</html>
