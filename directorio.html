<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Directorio de Localidades · Distrito 6</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:    #081534;
      --navy-md: #1e2a4a;
      --gold:    #c8a84b;
      --gold-lt: rgba(200,168,75,0.12);
      --bg:      #f8fafc;
      --card:    #ffffff;
      --border:  #e5e7eb;
      --text:    #111c2c;
      --muted:   #6b7280;
      --radius:  14px;
      --shadow:  0 2px 16px rgba(8,21,52,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ─────────────────────────────────────────────── */
    .hero {
      background: linear-gradient(155deg, #060e21 0%, #0d1626 45%, #1e2a4a 80%, #2d3f6e 100%);
      color: white;
      text-align: center;
      padding: 2.8rem 1.5rem 3.8rem;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 40px;
      background: var(--bg);
      clip-path: ellipse(56% 100% at 50% 100%);
    }
    .hero-ring {
      width: 62px; height: 62px;
      background: rgba(200,168,75,0.15);
      border: 2px solid rgba(200,168,75,0.45);
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 1.1rem;
    }
    .hero h1 {
      font-size: 1.6rem; font-weight: 800;
      margin-bottom: 0.2rem; line-height: 1.2;
    }
    .hero-sub  { font-size: 0.82rem; color: rgba(255,255,255,0.6); margin-bottom: 0.55rem; }
    .hero-badge {
      display: inline-block;
      background: var(--gold); color: var(--navy);
      font-size: 0.7rem; font-weight: 700;
      padding: 3px 12px; border-radius: 20px;
    }

    /* ── CONTENIDO ────────────────────────────────────────── */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.8rem 1rem 5rem;
    }

    /* ── BUSCADOR ─────────────────────────────────────────── */
    .search-wrap {
      position: relative; margin-bottom: 0.75rem;
    }
    .search-wrap input {
      width: 100%; height: 48px;
      padding: 0 1rem 0 3rem;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: inherit; font-size: 0.9rem;
      background: white; color: var(--text);
      outline: none;
      box-shadow: 0 1px 4px rgba(8,21,52,0.04);
      transition: border-color .15s, box-shadow .15s;
    }
    .search-wrap input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(8,21,52,0.07);
    }
    .search-icon {
      position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
      font-size: 1.05rem; color: var(--muted); pointer-events: none;
    }
    .count-bar {
      font-size: 0.75rem; color: var(--muted);
      margin-bottom: 1.2rem; padding-left: 2px;
    }

    /* ── GRID MASONRY SIMULADO ────────────────────────────── */
    /*
      Patrón de columnas por fila (3-2-3 / 2-3-2 / 1-2-3...):
      Usamos CSS grid auto-fill con cards de anchos variables
      via span. En mobile siempre 1 col.
    */
    .church-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.85rem;
    }

    /* Patrón alternado: filas de 3 (span 2 c/u) y filas de 2 (span 3 c/u) */
    /* Fila tipo A → 3 tarjetas */
    .church-grid .card-wrap.type-a { grid-column: span 2; }
    /* Fila tipo B → 2 tarjetas */
    .church-grid .card-wrap.type-b { grid-column: span 3; }

    @media (max-width: 640px) {
      .church-grid { grid-template-columns: 1fr; }
      .church-grid .card-wrap { grid-column: span 1 !important; }
    }

    /* ── TARJETA ──────────────────────────────────────────── */
    .church-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      border-top: 3px solid var(--gold);
      box-shadow: var(--shadow);
      padding: 1.25rem 1.15rem 1.1rem;
      text-decoration: none; color: inherit; display: flex;
      flex-direction: column; gap: 0.55rem;
      height: 100%;
      transition: box-shadow .18s, transform .18s;
      position: relative; overflow: hidden;
    }
    .church-card::before {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 80px; height: 80px;
      background: radial-gradient(circle at top right, rgba(200,168,75,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .church-card:hover {
      box-shadow: 0 8px 28px rgba(8,21,52,0.11);
      transform: translateY(-2px);
    }

    /* Número + nombre */
    .card-top {
      display: flex; align-items: flex-start; gap: 0.6rem;
    }
    .card-num {
      background: var(--navy); color: white;
      font-size: 0.65rem; font-weight: 800;
      padding: 2px 8px; border-radius: 20px;
      white-space: nowrap; margin-top: 3px; flex-shrink: 0;
    }
    .card-names {}
    .card-name {
      font-size: 0.95rem; font-weight: 800; color: var(--navy);
      line-height: 1.25;
    }
    .card-alias {
      font-size: 0.75rem; color: var(--gold); font-weight: 700;
      margin-top: 1px;
    }

    /* Distrito */
    .card-distrito {
      font-size: 0.7rem; font-weight: 700; color: var(--gold);
      display: flex; align-items: center; gap: 0.3rem;
    }

    /* Dirección */
    .card-addr {
      font-size: 0.78rem; color: var(--muted);
      line-height: 1.5;
      display: flex; align-items: flex-start; gap: 0.3rem;
    }
    .card-addr-icon { flex-shrink: 0; margin-top: 1px; }

    /* Ciudad */
    .card-ciudad {
      font-size: 0.78rem; color: var(--text); font-weight: 600;
      display: flex; align-items: center; gap: 0.3rem;
    }

    /* Botón Maps */
    .card-maps-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: #1a73e8; color: white;
      font-size: 0.72rem; font-weight: 700;
      padding: 5px 12px; border-radius: 8px;
      text-decoration: none;
      width: fit-content;
      transition: opacity .15s;
      margin-top: auto;
      font-family: inherit;
    }
    .card-maps-btn:hover { opacity: 0.88; }

    /* Verso bíblico */
    .card-verse {
      border-top: 1px solid var(--border);
      padding-top: 0.6rem;
      margin-top: 0.15rem;
    }
    .card-verse-ref {
      font-size: 0.65rem; font-weight: 700; color: var(--gold);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 0.25rem;
    }
    .card-verse-text {
      font-size: 0.75rem; color: var(--muted); font-style: italic;
      line-height: 1.55;
    }

    /* ── EMPTY ────────────────────────────────────────────── */
    .empty {
      text-align: center; padding: 4rem 1rem; color: var(--muted);
      grid-column: 1 / -1;
    }
    .empty .icon { font-size: 3.5rem; display: block; margin-bottom: 1rem; }

    /* ── FOOTER ───────────────────────────────────────────── */
    footer {
      text-align: center; padding: 1.5rem 1rem 2.5rem;
      font-size: 0.7rem; color: #a8a29e;
      border-top: 1px solid var(--border);
      max-width: 900px; margin: 0 auto;
    }

    /* ── SPINNER ──────────────────────────────────────────── */
    .spinner {
      text-align: center; padding: 3rem; color: var(--muted);
      font-size: 0.9rem; grid-column: 1 / -1;
    }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-ring">⛪</div>
    <h1>Directorio de Localidades</h1>
    <div class="hero-sub">Iglesia de Dios (7° día) A.R. · Distrito 6</div>
    <div class="hero-badge" id="heroBadge">Cargando…</div>
  </header>

  <div class="content">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput"
        placeholder="Buscar por nombre, dirección, C.P., número de domicilio…"
        autocomplete="off"/>
    </div>
    <div class="count-bar" id="countBar"></div>
    <div class="church-grid" id="churchList">
      <div class="spinner">Cargando localidades…</div>
    </div>
  </div>

  <footer>Sanctuary QR · Directorio de Iglesias · Distrito 6 · Jalisco</footer>

  <script>
  "use strict";

  const DEFAULT_VREF  = "Mateo 11:28";
  const DEFAULT_VTEXT = "\u00abVengan a m\u00ed todos los que est\u00e1n cansados y llevan cargas pesadas, y yo les dar\u00e9 descanso.\u00bb";

  // URL del JSON — mismo origen que el HTML publicado en GitHub Pages
  const JSON_URL = "./churches.json";

  function normalizeChurch(ch) {
    // Acepta tanto claves cortas (JSON exportado) como claves largas (localStorage legacy)
    if (ch.nombre !== undefined) return ch;
    return {
      nombre:   ch.n  || "",
      alias:    ch.a  || "",
      distrito: ch.di || "",
      pastor:   ch.p  || "",
      tel:      ch.t  || "",
      calle:    ch.ca || "",
      colonia:  ch.co || "",
      cp:       ch.cp || "",
      ciudad:   ch.ci || "",
      mapsUrl:  ch.m  || "",
      horarios: ch.h  || "",
      vRef:     ch.vr || "",
      vText:    ch.vt || ""
    };
  }

  async function fetchChurches() {
    // 1) Intenta cargar churches.json desde el mismo servidor
    try {
      const res = await fetch(JSON_URL, { cache: "no-cache" });
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data) && data.length) return data.map(normalizeChurch);
      }
    } catch(e) {}

    // 2) Fallback: hash en URL (compatibilidad con versión anterior)
    try {
      const hash = window.location.hash;
      if (hash && hash.startsWith("#data=")) {
        const json = decodeURIComponent(escape(atob(hash.slice(6))));
        const parsed = JSON.parse(json);
        if (Array.isArray(parsed) && parsed.length) return parsed.map(normalizeChurch);
      }
    } catch(e) {}

    // 3) Fallback: localStorage (desarrollo local)
    try {
      const local = JSON.parse(localStorage.getItem("sq_churches_v3") || "[]");
      if (local.length) return local.map(normalizeChurch);
    } catch(e) {}

    return [];
  }

  function esc(s) {
    return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function buildMapsURL(ch) {
    if (ch.mapsUrl) return ch.mapsUrl;
    const parts = [ch.calle, ch.colonia, ch.cp, ch.ciudad].filter(Boolean).join(", ");
    return parts ? "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(parts) : "";
  }

  /* Alterna el tipo de tarjeta en patrón 3-2-3-2... */
  function getCardType(idx) {
    // Agrupamos en bloques: 0-2 → tipo A (3 tarjetas), 3-4 → tipo B (2 tarjetas)
    const blockSize = 5; // 3+2
    const pos = idx % blockSize;
    return pos < 3 ? "type-a" : "type-b";
  }

  function renderList(churches) {
    const container = document.getElementById("churchList");
    const countBar  = document.getElementById("countBar");

    if (!churches.length) {
      container.innerHTML =
        '<div class="empty"><span class="icon">⛪</span>' +
        '<strong>Sin resultados</strong><br>' +
        '<span style="font-size:0.85rem">Intenta con otro término de búsqueda.</span></div>';
      countBar.textContent = "0 localidades";
      return;
    }

    countBar.textContent =
      churches.length + " localidad" + (churches.length !== 1 ? "es" : "");

    container.innerHTML = churches.map((ch, i) => {
      const addr   = [ch.calle, ch.colonia].filter(Boolean).join(", ");
      const addrFull = [ch.calle, ch.colonia, ch.cp].filter(Boolean).join(", ");
      const mapsHref = buildMapsURL(ch);
      const vRef   = ch.vRef  || DEFAULT_VREF;
      const vText  = ch.vText || DEFAULT_VTEXT;
      const type   = getCardType(i);

      return (
        '<div class="card-wrap ' + type + '">' +
          '<div class="church-card">' +
            /* Número + nombre */
            '<div class="card-top">' +
              '<span class="card-num">#' + (i+1) + '</span>' +
              '<div class="card-names">' +
                '<div class="card-name">' + esc(ch.nombre) + '</div>' +
                (ch.alias ? '<div class="card-alias">' + esc(ch.alias) + '</div>' : '') +
              '</div>' +
            '</div>' +

            /* Distrito */
            (ch.distrito
              ? '<div class="card-distrito">📍 ' + esc(ch.distrito) + '</div>'
              : '') +

            /* Dirección */
            (addrFull
              ? '<div class="card-addr"><span class="card-addr-icon">🏠</span><span>' + esc(addrFull) + '</span></div>'
              : '') +

            /* Ciudad */
            (ch.ciudad
              ? '<div class="card-ciudad">🌆 ' + esc(ch.ciudad) + '</div>'
              : '') +

            /* Botón Maps */
            (mapsHref
              ? '<a class="card-maps-btn" href="' + esc(mapsHref) + '" target="_blank" rel="noopener">📍 Ver en Google Maps</a>'
              : '') +

            /* Versículo */
            '<div class="card-verse">' +
              '<div class="card-verse-ref">' + esc(vRef) + '</div>' +
              '<div class="card-verse-text">' + esc(vText) + '</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
    }).join("");
  }

  async function init() {
    const badge = document.getElementById("heroBadge");
    const all   = await fetchChurches();

    if (!all.length) {
      badge.textContent = "Sin localidades";
      badge.style.background = "#f87171";
      document.getElementById("churchList").innerHTML =
        '<div class="empty">' +
          '<span class="icon">⛪</span>' +
          '<strong>No hay localidades disponibles</strong><br>' +
          '<span style="font-size:0.85rem">El administrador aún no ha publicado el archivo churches.json.</span>' +
        '</div>';
      document.getElementById("countBar").textContent = "";
      return;
    }

    badge.textContent = "Distrito 6 · " + all.length + " localidades";
    renderList(all);

    /* Búsqueda por nombre, dirección, C.P. y número de domicilio */
    document.getElementById("searchInput").addEventListener("input", function() {
      const q = this.value.trim().toLowerCase();
      if (!q) { renderList(all); return; }
      const filtered = all.filter(ch => {
        const haystack = [
          ch.nombre, ch.alias, ch.ciudad, ch.calle,
          ch.colonia, ch.cp, ch.pastor, ch.distrito
        ].filter(Boolean).join(" ").toLowerCase();
        return haystack.includes(q);
      });
      renderList(filtered);
    });
  }

  init();
  </script>
</body>
</html>
