<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Directorio de Localidades | Iglesia de Dios (7° día)</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    /* Estilos base para los iconos SVG integrados */
    .svg-icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
      display: inline-block;
      flex-shrink: 0;
    }

    /* ── TRUE MASONRY ─── */
    .masonry { columns: 2; column-gap: 12px; }
    @media (min-width: 640px)  { .masonry { columns: 2; column-gap: 20px; } }
    @media (min-width: 1024px) { .masonry { columns: 3; } }
    @media (min-width: 1280px) { .masonry { columns: 4; } }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 12px;
      display: inline-block;
      width: 100%;
    }
    @media (min-width: 640px) {
      .masonry-item { margin-bottom: 20px; }
    }

    /* ── HERO WAVE ────── */
    .hero-wave::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 48px;
      background: #f9f9ff;
      clip-path: ellipse(60% 100% at 50% 100%);
    }

    /* ── CARD ─────────── */
    .church-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      border-top: 3px solid #c8a84b;
      box-shadow: 0 2px 12px rgba(8,21,52,0.06);
      transition: transform .2s ease, box-shadow .2s ease;
      overflow: hidden;
    }
    .church-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(8,21,52,0.1);
    }

    /* ── SEARCH FOCUS ─── */
    .search-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(8,21,52,0.1); }

    [hidden] { display: none !important; }

    /* ── MOBILE COMPACT STYLES ─── */
    @media (max-width: 639px) {
      .card-body { padding: 12px !important; }
      .card-header { margin-bottom: 12px !important; }
      .card-title-block { margin-bottom: 12px !important; }
      .card-title { font-size: 14px !important; line-height: 1.25 !important; }
      .card-alias { font-size: 11px !important; margin-top: 2px !important; }
      .card-info { margin-bottom: 12px !important; }
      .card-info > * + * { margin-top: 6px !important; }
      .card-info-item { gap: 8px !important; }
      .card-info-icon { width: 16px !important; height: 16px !important; margin-top: 1px !important; }
      .card-info-text { font-size: 11px !important; line-height: 1.3 !important; }
      .card-btn {
        margin-bottom: 12px !important;
        padding-top: 6px !important;
        padding-bottom: 6px !important;
        font-size: 11px !important;
        border-radius: 8px !important;
      }
      .card-btn-icon { width: 16px !important; height: 16px !important; }
      .card-verse-block { padding-top: 8px !important; }
      .card-verse-ref { font-size: 9px !important; margin-bottom: 4px !important; }
      .card-verse-text { font-size: 10px !important; line-height: 1.3 !important; }
    }
  </style>
</head>
<body class="bg-surface font-sans text-on-surf min-h-screen">

  <header class="bg-navy shadow-md fixed w-full top-0 z-50">
    <div class="max-w-content mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <svg class="svg-icon text-gold" style="width:24px; height:24px;" viewBox="0 -960 960 960"><path d="M480-80 120-280v-400l360-200 360 200v400L480-80Zm0-134 280-156v-308L480-834 200-678v308l280 156Zm0-126v-160h160v-80H480v-120h-80v120H280v80h160v160h80Zm0-240Z"/></svg>
        <span class="font-bold text-lg text-gold tracking-tight">Sanctuary QR</span>
        <span class="hidden sm:inline text-white/40 mx-1">·</span>
        <span class="hidden sm:inline text-white/60 text-sm font-label">Directorio</span>
      </div>
      <div class="text-white/50 text-xs font-label">Iglesia de Dios (7° día) A.R.</div>
    </div>
  </header>

  <section class="bg-navy pt-28 pb-28 text-center px-4 relative overflow-hidden hero-wave">
    <div class="absolute inset-0 opacity-5 pointer-events-none"
         style="background: radial-gradient(circle at 20% 50%, #c8a84b 0%, transparent 50%), radial-gradient(circle at 80% 20%, #2d3f6e 0%, transparent 50%)"></div>
    <div class="relative z-10 max-w-2xl mx-auto flex flex-col items-center">
      <div class="bg-white/5 border border-gold/25 rounded-full p-4 mb-5">
        <svg class="svg-icon text-gold" style="width:48px; height:48px;" viewBox="0 -960 960 960"><path d="M480-80 120-280v-400l360-200 360 200v400L480-80Zm0-134 280-156v-308L480-834 200-678v308l280 156Zm0-126v-160h160v-80H480v-120h-80v120H280v80h160v160h80Zm0-240Z"/></svg>
      </div>
      <h1 class="text-3xl sm:text-4xl font-extrabold text-white mb-2 leading-tight">
        Directorio de Localidades
      </h1>
      <p class="text-gold/80 text-sm font-label mb-5">
        Iglesia de Dios (7° día) A.R. · Distrito 6
      </p>
      <div id="heroBadge"
           class="inline-flex items-center gap-1.5 bg-gold text-navy px-4 py-1.5 rounded-full text-xs font-bold font-label">
        <svg class="svg-icon text-navy" style="width:14px; height:14px;" viewBox="0 -960 960 960"><path d="m614-310 50-50-144-144v-176h-80v208l174 174Q403-400 400-480q0-133 93.5-226.5T720-800q133 0 226.5 93.5T1040-480q0 133-93.5 226.5T720-160q-43 0-83-11.5t-73-33.5Zm106-90q100 0 170-70t70-170q0-100-70-170t-170-70q-100 0-170 70t-70 170q0 100 70 170t170 70Z"/></svg>
        Cargando…
      </div>
    </div>
  </section>

  <section class="max-w-content mx-auto px-4 sm:px-6 -mt-10 relative z-20 mb-6">
    <div class="max-w-2xl mx-auto">
      <div class="relative group">
        <svg class="svg-icon text-muted absolute left-5 top-1/2 -translate-y-1/2 group-focus-within:text-navy transition-colors" style="width:20px; height:20px;" viewBox="0 -960 960 960"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-54 54ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg>
        <input id="searchInput" type="search" autocomplete="off"
          placeholder="Buscar por nombre, dirección, C.P., número de domicilio…"
          class="search-input w-full pl-14 pr-5 py-4 rounded-2xl border-none shadow-xl bg-white text-on-surf text-sm font-label placeholder:text-muted/60 transition-all"/>
      </div>
      <p id="countBar" class="text-center mt-3 text-muted text-xs font-label"></p>
    </div>
  </section>

  <main class="max-w-content mx-auto px-4 sm:px-6 pb-24">
    <div id="churchList" class="masonry">
      <div class="masonry-item" id="loadingSpinner">
        <div class="church-card p-6 flex items-center justify-center gap-3 text-muted text-sm font-label">
          <svg class="svg-icon animate-spin" style="width:20px; height:20px;" viewBox="0 -960 960 960"><path d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q17 0 28.5 11.5T520-840q0 17-11.5 28.5T480-800q-133 0-226.5 93.5T160-480q0 133 93.5 226.5T480-160q133 0 226.5-93.5T800-480q0-17 11.5-28.5T840-520q17 0 28.5 11.5T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Z"/></svg>
          Cargando localidades…
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t border-outline-v">
    <div class="max-w-content mx-auto px-6 py-6 flex flex-col sm:flex-row justify-between items-center gap-3">
      <div>
        <div class="font-bold text-navy text-sm">Directorio de Localidades</div>
        <p class="text-muted text-xs mt-0.5">© 2024 Iglesia de Dios (7° día) A.R. · Distrito 6 · Jalisco</p>
      </div>
      <div class="text-xs font-label text-muted">Sanctuary QR</div>
    </div>
  </footer>

  <script>
  "use strict";

  const DEFAULT_VREF  = "Mateo 11:28";
  const DEFAULT_VTEXT = "\u00abVengan a m\u00ed todos los que est\u00e1n cansados y llevan cargas pesadas, y yo les dar\u00e9 descanso.\u00bb";
  const JSON_URL      = "./churches.json";

  // Almacén de paths SVG nativos para componentes dinámicos
  const SVGS = {
    location: `<svg class="svg-icon card-distrito-icon" style="width:14px; height:14px;" viewBox="0 -960 960 960"><path d="M480-480q33 0 56.5-23.5T560-560q0-33-23.5-56.5T480-640q-33 0-56.5 23.5T400-560q0 33 23.5 56.5T480-480Zm0 400Q312-234 236-391.5T160-674q0-151 104.5-238.5T480-1000q161 0 265.5 87.5T850-674q0 116.5-76 274T480-80Z"/></svg>`,
    home: `<svg class="svg-icon text-navy/30 card-info-icon" style="width:18px; height:18px;" viewBox="0 -960 960 960"><path d="M160-120v-480l320-240 320 240v480H520v-240h-80v240H160Z"/></svg>`,
    city: `<svg class="svg-icon text-navy/30 card-info-icon" style="width:18px; height:18px;" viewBox="0 -960 960 960"><path d="M120-120v-360h160v-200h200v160h160v120h200v280H120Zm80-80h80v-80h-80v80Zm0-160h80v-80h-80v80Zm240 160h80v-80h-80v80Zm0-160h80v-80h-80v80Zm0-160h80v-80h-80v80Zm240 320h80v-80h-80v80Zm0-160h80v-80h-80v80Z"/></svg>`,
    person: `<svg class="svg-icon text-navy/30 card-info-icon" style="width:18px; height:18px;" viewBox="0 -960 960 960"><path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-240v-32q0-34 17.5-62.5T226-378q62-31 126-46.5T480-440q64 0 128 15.5T734-378q31 15 48.5 43.5T800-272v32H160Z"/></svg>`,
    schedule: `<svg class="svg-icon text-navy/30 card-info-icon" style="width:18px; height:18px;" viewBox="0 -960 960 960"><path d="m614-310 50-50-144-144v-176h-80v208l174 174Q403-400 400-480q0-133 93.5-226.5T720-800q133 0 226.5 93.5T1040-480q0 133-93.5 226.5T720-160q-43 0-83-11.5t-73-33.5Zm106-90q100 0 170-70t70-170q0-100-70-170t-170-70q-100 0-170 70t-70 170q0 100 70 170t170 70Z"/></svg>`,
    map: `<svg class="svg-icon card-btn-icon" style="width:18px; height:18px;" viewBox="0 -960 960 960"><path d="m600-120-240-84-240 84v-720l240-84 240 84 240-84v720L600-120Zm-40-143v-494l-160-56v494l160 56Zm80 54 160-55v-494l-160 55v494Zm-440-11 160-56v-494l-160 56v494Z"/></svg>`,
    church: `<svg class="svg-icon" style="width:48px; height:48px;" viewBox="0 -960 960 960"><path d="M480-80 120-280v-400l360-200 360 200v400L480-80Zm0-134 280-156v-308L480-834 200-678v308l280 156Zm0-126v-160h160v-80H480v-120h-80v120H280v80h160v160h80Zm0-240Z"/></svg>`,
    warning: `<svg class="svg-icon" style="width:14px; height:14px;" viewBox="0 -960 960 960"><path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-197q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Z"/></svg>`,
    verified: `<svg class="svg-icon" style="width:14px; height:14px;" viewBox="0 -960 960 960"><path d="m344-60-76-128-144-32 14-148-98-112 98-112-14-148 144-32 76-128 136 58 136-58 76 128 144 32-14 148 98 112-98 112 14 148-144 32-76 128-136-58-136 58Zm34-102 102-44 104 44 56-96 110-24-10-112 74-86-74-86 10-112-110-24-56-96-104 44-102-44-56 96-110 24 10 112-74 86 74 86-10 112 110 24 56 96Zm102-318 212-212-56-56-156 156-76-76-56 56 132 132Z"/></svg>`
  };

  function normalizeChurch(ch) {
    if (ch.nombre !== undefined) return ch;
    return {
      nombre:   ch.n  || "",
      alias:    ch.a  || "",
      distrito: ch.di || "",
      pastor:   ch.p  || "",
      tel:      ch.t  || "",
      calle:    ch.ca || "",
      colonia:  ch.co || "",
      cp:       ch.cp || "",
      ciudad:   ch.ci || "",
      mapsUrl:  ch.m  || "",
      horarios: ch.h  || "",
      vRef:     ch.vr || "",
      vText:    ch.vt || ""
    };
  }

  async function fetchChurches() {
    try {
      const res = await fetch(JSON_URL);
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data) && data.length) return data.map(normalizeChurch);
      }
    } catch(e) {}
    try {
      const hash = window.location.hash;
      if (hash && hash.startsWith("#data=")) {
        const json = decodeURIComponent(escape(atob(hash.slice(6))));
        const parsed = JSON.parse(json);
        if (Array.isArray(parsed) && parsed.length) return parsed.map(normalizeChurch);
      }
    } catch(e) {}
    try {
      const local = JSON.parse(localStorage.getItem("sq_churches_v3") || "[]");
      if (local.length) return local.map(normalizeChurch);
    } catch(e) {}
    return [];
  }

  function esc(s) {
    return (s||"").replace(/&/g,"&").replace(/</g,"<").replace(/>/g,">");
  }

  function buildMapsURL(ch) {
    if (ch.mapsUrl) return ch.mapsUrl;
    const parts = [ch.calle, ch.colonia, ch.cp, ch.ciudad].filter(Boolean).join(", ");
    return parts ? "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(parts) : "";
  }

  function renderCard(ch, i) {
    const addrFull = [ch.calle, ch.colonia, ch.cp].filter(Boolean).join(", ");
    const mapsHref = buildMapsURL(ch);
    const vRef     = ch.vRef  || DEFAULT_VREF;
    const vText    = ch.vText || DEFAULT_VTEXT;

    return `
      <div class="masonry-item">
        <div class="church-card">
          <div class="p-6 card-body">
            <div class="flex justify-between items-start mb-5 card-header">
              <span class="bg-navy text-white text-xs font-bold font-label px-3 py-1 rounded-full card-badge">#${i+1}</span>
              ${ch.distrito ? `
              <div class="flex items-center gap-1 text-gold text-xs font-bold font-label card-distrito">
                \u200B${SVGS.location}
                <span>${esc(ch.distrito)}</span>
              </div>` : ''}
            </div>

            <div class="mb-5 card-title-block">
              <h3 class="text-lg font-extrabold text-navy leading-tight card-title">${esc(ch.nombre)}</h3>
              ${ch.alias ? `<p class="text-gold font-bold text-sm font-label mt-0.5 card-alias">${esc(ch.alias)}</p>` : ''}
            </div>

            <div class="space-y-3 mb-5 card-info">
              ${addrFull ? `
              <div class="flex items-start gap-3 card-info-item">
                \u200B${SVGS.home}
                <span class="text-muted text-sm font-label leading-snug card-info-text">${esc(addrFull)}</span>
              </div>` : ''}
              ${ch.ciudad ? `
              <div class="flex items-center gap-3 card-info-item">
                \u200B${SVGS.city}
                <span class="text-navy font-semibold text-sm font-label card-info-text font-bold">${esc(ch.ciudad)}</span>
              </div>` : ''}
              ${ch.pastor ? `
              <div class="flex items-center gap-3 card-info-item">
                \u200B${SVGS.person}
                <span class="text-muted text-sm font-label card-info-text">${esc(ch.pastor)}</span>
              </div>` : ''}
              ${ch.horarios ? `
              <div class="flex items-start gap-3 card-info-item">
                \u200B${SVGS.schedule}
                <span class="text-muted text-sm font-label leading-snug card-info-text">${esc(ch.horarios.replace(/\n/g," · "))}</span>
              </div>` : ''}
            </div>

            ${mapsHref ? `
            <a href="${esc(mapsHref)}" target="_blank" rel="noopener"
               class="w-full flex items-center justify-center gap-2 bg-[#1a73e8] hover:brightness-95 text-white text-sm font-bold font-label py-2.5 rounded-xl transition-all mb-5 card-btn">
              \u200B${SVGS.map}
              Ver en Google Maps
            </a>` : ''}

            <div class="border-t border-outline-v pt-4 flex flex-col items-center text-center card-verse-block">
              <span class="text-gold text-xs font-bold font-label uppercase tracking-widest mb-1.5 card-verse-ref">${esc(vRef)}</span>
              <p class="italic text-muted text-xs leading-relaxed card-verse-text">${esc(vText)}</p>
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderList(churches) {
    const container = document.getElementById("churchList");
    const countBar  = document.getElementById("countBar");

    if (!churches.length) {
      container.innerHTML = `
        <div class="masonry-item">
          <div class="church-card p-10 flex flex-col items-center text-center text-muted gap-3">
            \u200B${SVGS.church}
            <strong class="text-on-surf">Sin resultados</strong>
            <span class="text-sm">Intenta con otro término de búsqueda.</span>
          </div>
        </div>`;
      countBar.textContent = "0 localidades";
      return;
    }

    countBar.textContent =
      churches.length + " localidad" + (churches.length !== 1 ? "es" : "") + " encontradas";
    container.innerHTML = churches.map(renderCard).join("");
  }

  async function init() {
    const badge = document.getElementById("heroBadge");
    const all   = await fetchChurches();

    if (!all.length) {
      badge.innerHTML = `
        \u200B${SVGS.warning}
        Sin localidades`;
      badge.classList.remove("bg-gold");
      badge.classList.add("bg-red-400", "text-white");

      document.getElementById("churchList").innerHTML = `
        <div class="masonry-item">
          <div class="church-card p-10 flex flex-col items-center text-center text-muted gap-3">
            \u200B${SVGS.church}
            <strong class="text-on-surf">No hay localidades disponibles</strong>
            <span class="text-sm">El administrador aún no ha publicado el archivo churches.json.</span>
          </div>
        </div>`;
      document.getElementById("countBar").textContent = "";
      return;
    }

    badge.innerHTML = `
      \u200B${SVGS.verified}
      Distrito 6 · ${all.length} localidades`;

    renderList(all);

    document.getElementById("searchInput").addEventListener("input", function() {
      const q = this.value.trim().toLowerCase();
      if (!q) { renderList(all); return; }
      renderList(all.filter(ch => {
        return [ch.nombre, ch.alias, ch.ciudad, ch.calle,
                ch.colonia, ch.cp, ch.pastor, ch.distrito]
          .filter(Boolean).join(" ").toLowerCase().includes(q);
      }));
    });
  }

  init();
  </script>
</body>
</html>
